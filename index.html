<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vishy School of Yoga — Find Your Balance</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <!-- AOS Animation Library -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <!-- SEO -->
  <meta name="description" content="Vishy School of Yoga — Hatha, Vinyasa, Yin classes for all levels. Book a class, meet instructors, and start your wellness journey.">

  <!-- External CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<!-- Vercel Web Analytics -->
<script src="/_vercel/insights/script.js" defer></script>

<body>
  <!-- Navbar -->
  <div data-include="partials/navbar.html"></div>

  <!-- Hero Carousel -->
  <div data-include="partials/carousel.html"></div>

  <!-- Classes Section -->
  <div data-include="partials/classes.html"></div>

  <!-- Schedule Section -->
  <div data-include="partials/schedule.html"></div>

  <!-- Instructors Section -->
  <div data-include="partials/instructor.html"></div>

  <!-- Testimonials Section -->
  <div data-include="partials/testimonials.html"></div>

  <!-- Contact Section -->
  <div data-include="partials/contact.html"></div>

  <!-- Footer -->
  <div data-include="partials/footer.html"></div>

  <!-- Bootstrap Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- AOS Animation Library -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <!-- Include loader + AOS + Year script -->
  <script>
    // Load all partials
    document.querySelectorAll('[data-include]').forEach(el => {
      fetch(el.getAttribute('data-include'))
        .then(res => res.text())
        .then(html => { el.innerHTML = html; });
    });

    // Initialize AOS (after partials load)
    setTimeout(() => {
      AOS.init({
        duration: 800,
        easing: 'ease-in-out',
        once: true,
        offset: 100
      });
    }, 500);

    // Set current year
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
