<section id="schedule" class="py-5 bg-light">
  <div class="container">
    <div class="text-center mb-5" data-aos="fade-up">
      <h2 class="display-6 fw-bold mb-3">Weekly Schedule</h2>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8" data-aos="fade-up" data-aos-delay="100">
        <div class="schedule-card card border-0 shadow-sm">
          <div class="card-body p-4">

            <!-- Header -->
            <div class="d-flex align-items-center mb-4">
              <div class="day-badge">MON–FRI</div>
              <h4 class="mb-0 ms-3">Batch Timings</h4>
            </div>

            <!-- Batch 1 -->
            <div class="schedule-item mb-3">
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-semibold">Morning Batch - 1</span>
                <span class="badge bg-accent">6:00 AM – 7:00 AM</span>
              </div>
            </div>

            <!-- Batch 2 -->
            <div class="schedule-item mb-3">
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-semibold">Morning Batch - 2</span>
                <span class="badge bg-accent">7:30 AM – 8:30 AM</span>
              </div>
            </div>

            <!-- Batch 3 -->
            <div class="schedule-item">
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-semibold">Evening Batch</span>
                <span class="badge bg-accent">5:30 PM – 6:30 PM</span>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- Holiday Notice -->
    <div class="row justify-content-center mt-4" data-aos="fade-up" data-aos-delay="200">
      <div class="col-lg-8">
        <div class="holiday-notice d-flex align-items-center gap-3">
          <span class="holiday-icon">🚫</span>
          <div>
            <span class="holiday-title">No Classes on Weekends - </span>
            <span class="holiday-sub">SATURDAYS &amp; SUNDAYS are holidays.</span>
          </div>
        </div>
      </div>
    </div>

    </div>
  </div>
</section>
